services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-14317}:4317"
      - "${OTEL_HTTP_PORT:-14318}:4318"
      - "${OTEL_HEALTH_PORT:-13133}:13133"
      - "${OTEL_PROM_PORT:-18889}:8889"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../alerts/prometheus:/etc/prometheus/rules:ro
    ports:
      - "${PROMETHEUS_PORT:-19090}:9090"

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
    ports:
      - "${LOKI_PORT:-13100}:3100"

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./tempo/config.yml:/etc/tempo/config.yml:ro
    ports:
      - "${TEMPO_PORT:-13200}:3200"
      - "${TEMPO_OTLP_GRPC_PORT:-14319}:4317"

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ../dashboards/provisioning:/etc/grafana/provisioning:ro
      - ../dashboards/json:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-13000}:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${ALERTMANAGER_PORT:-19093}:9093"
