groups:
  - name: obs-platform-baseline
    rules:
      - alert: HTTP5xxRateSpike
        expr: sum(rate(http_server_requests_total{status_class="5xx"}[5m])) by (service, env) > 1
        for: 5m
        labels:
          severity: warning
          team: platform
          summary: HTTP 5xx rate spike detected
          description: HTTP 5xx rate is above threshold for 5 minutes.
          runbook_url: https://runbooks.local/http-5xx-rate-spike
          dashboard_url: https://grafana.local/d/http-overview
        annotations:
          summary: HTTP 5xx spike on {{ $labels.service }} ({{ $labels.env }})

      - alert: HTTPP95LatencyBreach
        expr: histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le, service, env)) > 0.5
        for: 10m
        labels:
          severity: warning
          team: platform
          summary: HTTP p95 latency breached
          description: p95 latency is above 500ms for 10 minutes.
          runbook_url: https://runbooks.local/http-p95-latency
          dashboard_url: https://grafana.local/d/http-overview
        annotations:
          summary: HTTP p95 latency breach on {{ $labels.service }} ({{ $labels.env }})

      - alert: ServiceNotReady
        expr: min_over_time(up{job="service-readiness"}[5m]) == 0
        for: 5m
        labels:
          severity: critical
          team: platform
          summary: Service readiness failed
          description: Readiness check is failing continuously.
          runbook_url: https://runbooks.local/service-not-ready
          dashboard_url: https://grafana.local/d/service-readiness
        annotations:
          summary: Service not ready in {{ $labels.env }}

      - alert: QueueOldestAgeBreach
        expr: max(asynq_queue_oldest_age_seconds) by (service, env, queue) > 300
        for: 10m
        labels:
          severity: warning
          team: platform
          summary: Queue oldest age breached
          description: Queue oldest job age is above 5 minutes.
          runbook_url: https://runbooks.local/queue-oldest-age
          dashboard_url: https://grafana.local/d/queue-overview
        annotations:
          summary: Queue oldest age breach for {{ $labels.queue }}

      - alert: RetryStorm
        expr: sum(rate(asynq_jobs_retried_total[5m])) by (service, env, queue) > 5
        for: 10m
        labels:
          severity: critical
          team: platform
          summary: Retry storm detected
          description: Retry rate exceeded threshold for 10 minutes.
          runbook_url: https://runbooks.local/retry-storm
          dashboard_url: https://grafana.local/d/queue-overview
        annotations:
          summary: Retry storm for queue {{ $labels.queue }}

      - alert: DeadLetterGrowth
        expr: increase(asynq_dead_letter_total[30m]) > 0
        for: 30m
        labels:
          severity: critical
          team: platform
          summary: Dead-letter queue growth detected
          description: Dead-letter entries increased over 30 minutes.
          runbook_url: https://runbooks.local/dead-letter-growth
          dashboard_url: https://grafana.local/d/queue-overview
        annotations:
          summary: Dead-letter growth detected

      - alert: DBDependencyFailure
        expr: sum(rate(db_client_queries_total{result="error"}[5m])) by (service, env) > 1
        for: 10m
        labels:
          severity: critical
          team: platform
          summary: Database dependency failure
          description: Database error rate exceeded threshold.
          runbook_url: https://runbooks.local/db-dependency-failure
          dashboard_url: https://grafana.local/d/db-overview
        annotations:
          summary: DB dependency failure for {{ $labels.service }}
