name: Policy CI

on:
  pull_request:

jobs:
  race-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Race tests gate
        run: ./scripts/test-race.sh

  docs-first:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Docs-first policy
        run: |
          ./scripts/check-docs-first.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

  readiness-fn-deprecation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Readiness Fn deprecation policy
        run: ./scripts/check-readiness-fn-deprecation.sh

  split-ready-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Boundary checks
        run: ./scripts/check-boundaries.sh
