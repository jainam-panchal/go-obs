name: Module CI

on:
  pull_request:
    paths:
      - 'module/**'
      - '.github/workflows/module-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Race tests
        run: ./scripts/test-race.sh
