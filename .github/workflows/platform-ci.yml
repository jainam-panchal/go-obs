name: Platform CI

on:
  pull_request:
    paths:
      - 'platform/**'
      - 'alerts/**'
      - 'dashboards/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/platform-ci.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate platform, alerts, dashboards
        run: make lint
